<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Agenda — El Mostrito</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #F5F5F0; color: #1a1a1a; padding: 1rem; min-height: 100vh; }
.wrap { max-width: 700px; margin: 0 auto; }
h1 { font-size: 20px; font-weight: 600; margin-bottom: 2px; }
.sub { font-size: 12px; color: #6b7280; margin-bottom: 1rem; }
.topbar { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
.btn { font-size: 12px; padding: 6px 14px; border-radius: 8px; border: 0.5px solid #d1d5db; background: #fff; cursor: pointer; }
.btn-primary { background: #6366F1; color: #fff; border-color: #6366F1; font-weight: 500; }
.btn-sync { font-size: 12px; padding: 5px 12px; border-radius: 8px; border: 0.5px solid #d1d5db; background: #fff; cursor: pointer; margin-left: auto; }
.sync-ok { font-size: 12px; color: #059669; }
.sync-err { font-size: 12px; color: #DC2626; }
.btn-chat { background: #FEF3C7; color: #92400E; border-color: #FDE68A; position: relative; }
.chat-badge { position: absolute; top: -6px; right: -6px; background: #D97706; color: #fff; border-radius: 999px; font-size: 10px; padding: 1px 5px; font-weight: 700; }
.stats { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
.stat { flex: 1; min-width: 80px; background: #fff; border-radius: 10px; padding: 10px 12px; border: 0.5px solid #e5e7eb; }
.stat-val { font-size: 22px; font-weight: 700; }
.stat-label { font-size: 11px; color: #6b7280; }
.nav { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
.nav-btn { font-size: 12px; padding: 5px 14px; border-radius: 999px; border: 0.5px solid #d1d5db; background: #fff; cursor: pointer; }
.nav-btn.active { border: 1.5px solid #6366F1; background: #EEF2FF; color: #3730A3; font-weight: 500; }
.filters { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
.search { font-size: 12px; padding: 5px 10px; border-radius: 8px; border: 0.5px solid #d1d5db; background: #fff; flex: 1; min-width: 120px; outline: none; }
.filter-btn { font-size: 11px; padding: 4px 10px; border-radius: 999px; border: 0.5px solid #d1d5db; background: #fff; cursor: pointer; }
.filter-btn.active { border: 1.5px solid #6366F1; background: #EEF2FF; color: #3730A3; }
.section-label { font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 1px; margin: 0 0 8px; }
.task-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1.25rem; }
.task { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; background: #fff; border: 0.5px solid #e5e7eb; border-radius: 10px; border-left-width: 3px; transition: opacity .15s; }
.task.done { opacity: 0.5; }
.task input[type=checkbox] { margin-top: 2px; accent-color: #6366F1; flex-shrink: 0; cursor: pointer; }
.task-body { flex: 1; min-width: 0; }
.task-text { font-size: 13px; font-weight: 500; line-height: 1.4; margin-bottom: 4px; }
.task.done .task-text { text-decoration: line-through; color: #6b7280; }
.task-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.area-tag { font-size: 11px; padding: 1px 7px; border-radius: 999px; font-weight: 500; }
.source-tag { font-size: 11px; padding: 1px 7px; border-radius: 999px; font-weight: 500; }
.task-time { font-size: 11px; color: #6b7280; }
.task-nota { font-size: 11px; color: #9ca3af; font-style: italic; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
.btn-del { background: none; border: none; cursor: pointer; color: #9ca3af; font-size: 16px; padding: 2px; line-height: 1; flex-shrink: 0; }
.empty { text-align: center; color: #6b7280; font-size: 13px; padding: 2rem 0; }
.loading { text-align: center; color: #6b7280; font-size: 13px; padding: 1rem 0; }
.upload { border: 1.5px dashed #d1d5db; border-radius: 12px; background: #fafafa; padding: 1rem; text-align: center; cursor: pointer; margin-bottom: 1rem; font-size: 13px; color: #6b7280; }
.upload:hover { border-color: #6366F1; background: #EEF2FF; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
.overlay.show { display: flex; }
.modal { background: #fff; border-radius: 16px; padding: 1.5rem; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; }
.modal h3 { font-size: 16px; font-weight: 500; margin-bottom: 1rem; }
.form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1rem; }
.form-row { display: flex; gap: 8px; }
.form-row > * { flex: 1; }
input[type=text], input[type=date], input[type=time], select, textarea { font-size: 13px; padding: 7px 10px; border-radius: 8px; border: 0.5px solid #d1d5db; background: #f9fafb; outline: none; font-family: inherit; width: 100%; }
textarea { resize: none; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1rem; }
.chat-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; background: #fff; border: 0.5px solid #e5e7eb; border-radius: 10px; margin-bottom: 8px; }
.chat-item.importado { opacity: 0.5; }
.btn-import { font-size: 11px; padding: 4px 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: 500; flex-shrink: 0; }
.google-section { background: #F0FDF4; border: 0.5px solid #A7F3D0; border-radius: 10px; padding: 10px 12px; margin-bottom: 1rem; }
.google-section h4 { font-size: 11px; font-weight: 600; color: #065F46; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Mi Agenda</h1>
  <p class="sub" id="fecha-hoy"></p>

  <div class="topbar">
    <span id="sync-status"></span>
    <button class="btn-sync" onclick="fetchGoogle()">↻ Sincronizar Gmail y Calendar</button>
  </div>

  <div class="topbar" style="margin-top:-4px">
    <button class="btn btn-chat" onclick="abrirChat()" id="btn-chat">
      💬 Del chat <span class="chat-badge" id="chat-badge" style="display:none"></span>
    </button>
    <button class="btn btn-primary" onclick="abrirModal()">+ Nueva tarea</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-val" id="s-hoy" style="color:#6366F1">0</div><div class="stat-label">Pendientes hoy</div></div>
    <div class="stat"><div class="stat-val" id="s-total" style="color:#F59E0B">0</div><div class="stat-label">Total pendientes</div></div>
    <div class="stat"><div class="stat-val" id="s-done" style="color:#059669">0</div><div class="stat-label">Completadas</div></div>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="setVista('hoy',this)">Hoy</button>
    <button class="nav-btn" onclick="setVista('semana',this)">Próximos días</button>
    <button class="nav-btn" onclick="setVista('areas',this)">Por área</button>
    <button class="nav-btn" onclick="setVista('google',this)">📧 Gmail / 📅 Calendar</button>
  </div>

  <div class="filters">
    <input class="search" type="text" placeholder="Buscar tarea…" oninput="render()" id="busqueda">
    <button class="filter-btn active" onclick="setArea('Todas',this)">Todas</button>
    <button class="filter-btn" onclick="setArea('Operaciones',this)">Operaciones</button>
    <button class="filter-btn" onclick="setArea('Finanzas',this)">Finanzas</button>
    <button class="filter-btn" onclick="setArea('RRHH',this)">RRHH</button>
    <button class="filter-btn" onclick="setArea('Estrategia',this)">Estrategia</button>
    <button class="filter-btn" onclick="setArea('Personal',this)">Personal</button>
  </div>

  <div class="upload" onclick="document.getElementById('file-input').click()">
    <input type="file" id="file-input" accept="image/*" style="display:none" onchange="procesarImagen(this.files[0])">
    <span id="upload-label">📷 Sube una foto de tu agenda para extraer pendientes con IA</span>
  </div>

  <div id="contenido"></div>
</div>

<!-- Modal nueva tarea -->
<div class="overlay" id="modal-tarea">
  <div class="modal">
    <h3>Nueva tarea</h3>
    <div class="form-group">
      <input type="text" id="f-texto" placeholder="¿Qué tienes que hacer?">
      <div class="form-row">
        <select id="f-area">
          <option>Operaciones</option><option>Finanzas</option><option>RRHH</option>
          <option>Estrategia</option><option>Personal</option><option>Otro</option>
        </select>
        <select id="f-prioridad">
          <option value="alta">Alta</option>
          <option value="media" selected>Media</option>
          <option value="baja">Baja</option>
        </select>
      </div>
      <div class="form-row">
        <input type="date" id="f-fecha">
        <input type="time" id="f-hora">
      </div>
      <textarea id="f-nota" rows="2" placeholder="Nota adicional (opcional)"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarTarea()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal recordatorios del chat -->
<div class="overlay" id="modal-chat">
  <div class="modal">
    <h3>💬 Recordatorios del chat</h3>
    <p style="font-size:12px;color:#6b7280;margin-bottom:1rem">Generados desde tu sesión con Claude — se agregan para mañana</p>
    <div id="chat-lista"></div>
    <div class="modal-footer">
      <button class="btn" onclick="cerrarChat()">Cerrar</button>
      <button class="btn btn-primary" onclick="importarTodos()">Agregar todos</button>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyAq2GKWkPKq63PQNCjk5mfc0Sk6wpd9jhGxUJGzVRt1DmG8drdeUPcfq_XkJ-P1wWg/exec";

const AREA_COLOR = {
  Operaciones:"#2563EB",Finanzas:"#059669",RRHH:"#7C3AED",
  Estrategia:"#D97706",Personal:"#DB2777",Otro:"#6B7280",
  Gmail:"#EA4335",Calendar:"#1A73E8"
};
const PRIO_COLOR = {alta:"#EF4444",media:"#F59E0B",baja:"#D1D5DB"};
const PRIO_BG    = {alta:"#FEF2F2",media:"#FFFBEB",baja:"#F9FAFB"};
const AREAS = ["Operaciones","Finanzas","RRHH","Estrategia","Personal","Otro"];

function hoy()    { return new Date().toISOString().split("T")[0]; }
function manana() { return new Date(Date.now()+86400000).toISOString().split("T")[0]; }
function fmtFecha(iso, soloFecha) {
  if (!iso) return "";
  try {
    const d = new Date(iso);
    if (soloFecha) return d.toLocaleDateString("es-PE",{weekday:"short",day:"numeric",month:"short"});
    return d.toLocaleDateString("es-PE",{weekday:"short",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});
  } catch(e) { return ""; }
}

let tareas    = JSON.parse(localStorage.getItem("agenda-tareas")||"[]");
let googleData= JSON.parse(localStorage.getItem("agenda-google")||"{}");
let vista     = "hoy";
let areaFiltro= "Todas";
let importados= JSON.parse(localStorage.getItem("agenda-importados")||"[]");

const RECORDATORIOS = [
  {texto:"Buscar desarrollador en Workana para agente de flujo de caja", area:"Finanzas", prioridad:"alta", nota:"Compartir documento de requerimientos ya generado"},
  {texto:"Crear 8 carpetas en OneDrive y mover archivos", area:"Operaciones", prioridad:"alta", nota:"Estructura ya definida: RRHH, Legal, Operaciones, Estrategia, etc."},
  {texto:"Enviar RIT v5 a asesor legal para revisión final", area:"RRHH", prioridad:"alta", nota:"RIT microempresa SICAM PERÚ — listo para revisión"},
  {texto:"Descargar Plan de Trabajo 2026 desde Google Drive", area:"Personal", prioridad:"media", nota:"Archivo: Plan_Trabajo_ElMostrito_2026.html"},
  {texto:"Verificar conexión Gmail y Calendar en la agenda", area:"Estrategia", prioridad:"media", nota:"Nueva URL del script ya configurada"},
];

if (tareas.length===0) {
  tareas = [
    {id:1,texto:"Revisar caja del día",area:"Finanzas",prioridad:"alta",fecha:hoy(),hora:"08:00",nota:"",done:false},
    {id:2,texto:"Reunión con proveedor de insumos",area:"Operaciones",prioridad:"alta",fecha:hoy(),hora:"10:00",nota:"",done:false},
    {id:3,texto:"Publicar oferta de trabajo en redes",area:"RRHH",prioridad:"media",fecha:hoy(),hora:"",nota:"",done:false},
  ];
  guardar();
}

document.getElementById("fecha-hoy").textContent =
  new Date().toLocaleDateString("es-PE",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
document.getElementById("f-fecha").value = hoy();

function guardar() { localStorage.setItem("agenda-tareas", JSON.stringify(tareas)); }

function fetchGoogle() {
  const status = document.getElementById("sync-status");
  status.className = ""; status.textContent = "Sincronizando…";

  const cbName = "__gs_" + Date.now();
  const script = document.createElement("script");
  const timer  = setTimeout(function() {
    delete window[cbName];
    if (script.parentNode) document.head.removeChild(script);
    status.className = "sync-err"; status.textContent = "⚠ No se pudo conectar";
  }, 20000);

  window[cbName] = function(data) {
    clearTimeout(timer);
    delete window[cbName];
    if (script.parentNode) document.head.removeChild(script);

    if (data.error) { status.className="sync-err"; status.textContent="⚠ "+data.error; return; }

    googleData = data;
    localStorage.setItem("agenda-google", JSON.stringify(data));
    status.className = "sync-ok";
    status.textContent = "✓ Sincronizado " + new Date().toLocaleTimeString("es-PE",{hour:"2-digit",minute:"2-digit"});
    render();
  };

  script.src = SCRIPT_URL + "?callback=" + cbName;
  script.onerror = function() {
    clearTimeout(timer);
    status.className = "sync-err"; status.textContent = "⚠ Error de conexión";
  };
  document.head.appendChild(script);
}

function setVista(v,el) {
  vista=v;
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active"); render();
}
function setArea(a,el) {
  areaFiltro=a;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active"); render();
}

function filtrar(lista) {
  const q = document.getElementById("busqueda").value.toLowerCase();
  return lista
    .filter(t=>areaFiltro==="Todas"||t.area===areaFiltro)
    .filter(t=>t.texto.toLowerCase().includes(q))
    .sort((a,b)=>["alta","media","baja"].indexOf(a.prioridad)-["alta","media","baja"].indexOf(b.prioridad));
}

function render() {
  const hoyStr=hoy(), mananaStr=manana();
  const th=tareas.filter(t=>t.fecha===hoyStr);
  const tm=tareas.filter(t=>t.fecha===mananaStr);
  const tf=tareas.filter(t=>t.fecha>mananaStr);

  document.getElementById("s-hoy").textContent  = tareas.filter(t=>t.fecha===hoyStr&&!t.done).length;
  document.getElementById("s-total").textContent = tareas.filter(t=>!t.done).length;
  document.getElementById("s-done").textContent  = tareas.filter(t=>t.done).length;

  const pendChat = RECORDATORIOS.filter(r=>!importados.includes(r.texto)).length;
  const badge = document.getElementById("chat-badge");
  badge.textContent=pendChat; badge.style.display=pendChat>0?"inline":"none";

  let html="";

  if (vista==="google") {
    html = renderGoogle();
  } else if (vista==="hoy") {
    html += seccion("Hoy",filtrar(th));
    if (filtrar(tm).length) html+=seccion("Mañana",filtrar(tm));
  } else if (vista==="semana") {
    html+=seccion("Hoy",filtrar(th));
    html+=seccion("Mañana",filtrar(tm));
    html+=seccion("Próximamente",filtrar(tf));
  } else {
    AREAS.forEach(a=>{
      const l=filtrar(tareas.filter(t=>t.area===a));
      if (l.length) html+=seccionArea(a,l);
    });
  }
  if (!html) html='<p class="empty">No hay tareas en esta vista.</p>';
  document.getElementById("contenido").innerHTML=html;
}

function renderGoogle() {
  let html="";
  const correos  = (googleData.correos||[]);
  const eventos  = (googleData.eventos||[]);

  if (!correos.length && !eventos.length) {
    return '<p class="empty">Toca "↻ Sincronizar Gmail y Calendar" para cargar tus datos.</p>';
  }

  if (correos.length) {
    html+='<div class="google-section"><h4>📧 Correos no leídos ('+correos.length+')</h4>';
    correos.forEach(function(c) {
      html+='<div class="task" style="border-left-color:#EA4335;background:#FFF8F7">'+
        '<div class="task-body">'+
          '<div class="task-text">'+c.asunto+'</div>'+
          '<div class="task-meta">'+
            '<span class="source-tag" style="background:#FECDD3;color:#9F1239">Gmail</span>'+
            '<span class="task-time">De: '+c.de+'</span>'+
          '</div>'+
          (c.snippet?'<div class="task-nota">'+c.snippet+'</div>':'')+
        '</div>'+
        '<button class="btn btn-primary" style="font-size:11px;padding:3px 8px;flex-shrink:0" onclick="crearDesdeCorreo(\''+encodeURIComponent(c.asunto)+'\',\''+encodeURIComponent(c.de)+'\')">+ Agregar</button>'+
      '</div>';
    });
    html+='</div>';
  }

  if (eventos.length) {
    html+='<div class="google-section" style="background:#EFF6FF;border-color:#BFDBFE"><h4>📅 Próximos eventos ('+eventos.length+')</h4>';
    eventos.forEach(function(e) {
      const fecha = e.todo_dia==="si" ? fmtFecha(e.inicio,true) : fmtFecha(e.inicio,false);
      html+='<div class="task" style="border-left-color:#1A73E8;background:#F0F7FF">'+
        '<div class="task-body">'+
          '<div class="task-text">'+e.titulo+'</div>'+
          '<div class="task-meta">'+
            '<span class="source-tag" style="background:#BFDBFE;color:#1E40AF">Calendar</span>'+
            '<span class="task-time">'+fecha+'</span>'+
            (e.lugar?'<span class="task-time">📍 '+e.lugar+'</span>':'')+
          '</div>'+
        '</div>'+
        '<button class="btn btn-primary" style="font-size:11px;padding:3px 8px;flex-shrink:0" onclick="crearDesdeEvento(\''+encodeURIComponent(e.titulo)+'\',\''+e.inicio+'\')">+ Agregar</button>'+
      '</div>';
    });
    html+='</div>';
  }
  return html;
}

function crearDesdeCorreo(asunto, de) {
  document.getElementById("f-texto").value = "Responder: " + decodeURIComponent(asunto);
  document.getElementById("f-area").value  = "Operaciones";
  document.getElementById("f-nota").value  = "De: " + decodeURIComponent(de);
  document.getElementById("f-fecha").value = hoy();
  abrirModal();
}

function crearDesdeEvento(titulo, inicio) {
  document.getElementById("f-texto").value = "Preparar: " + decodeURIComponent(titulo);
  document.getElementById("f-area").value  = "Operaciones";
  document.getElementById("f-fecha").value = inicio.split("T")[0] || hoy();
  abrirModal();
}

function seccion(titulo,lista) {
  if (!lista.length) return "";
  const pend=lista.filter(t=>!t.done), done=lista.filter(t=>t.done);
  return '<p class="section-label">'+titulo+' · '+pend.length+' pendientes</p>'+
    '<div class="task-list">'+[...pend,...done].map(tareaHTML).join("")+'</div>';
}
function seccionArea(area,lista) {
  const pend=lista.filter(t=>!t.done),done=lista.filter(t=>t.done);
  const col=AREA_COLOR[area]||"#6B7280";
  return '<p class="section-label" style="color:'+col+'">● '+area+' · '+pend.length+' pendientes</p>'+
    '<div class="task-list">'+[...pend,...done].map(tareaHTML).join("")+'</div>';
}
function tareaHTML(t) {
  const col=AREA_COLOR[t.area]||"#6B7280";
  const pcol=PRIO_COLOR[t.prioridad]||"#D1D5DB";
  const pbg=PRIO_BG[t.prioridad]||"#F9FAFB";
  return '<div class="task'+(t.done?' done':'')+'" style="border-left-color:'+pcol+';background:'+(t.done?'#F9FAFB':pbg)+'">'+
    '<input type="checkbox" '+(t.done?'checked':'')+' onchange="toggleTarea('+t.id+')">'+
    '<div class="task-body">'+
      '<div class="task-text">'+t.texto+'</div>'+
      '<div class="task-meta">'+
        '<span class="area-tag" style="background:'+col+'20;color:'+col+'">'+t.area+'</span>'+
        (t.hora?'<span class="task-time">'+t.hora+'</span>':'')+
        (t.nota?'<span class="task-nota">"'+t.nota+'"</span>':'')+
      '</div>'+
    '</div>'+
    '<button class="btn-del" onclick="eliminarTarea('+t.id+')">×</button>'+
  '</div>';
}

function toggleTarea(id) { tareas=tareas.map(t=>t.id===id?{...t,done:!t.done}:t); guardar(); render(); }
function eliminarTarea(id) { tareas=tareas.filter(t=>t.id!==id); guardar(); render(); }
function abrirModal()  { document.getElementById("modal-tarea").classList.add("show"); }
function cerrarModal() { document.getElementById("modal-tarea").classList.remove("show"); }

function guardarTarea() {
  const texto=document.getElementById("f-texto").value.trim();
  if (!texto) return;
  tareas.push({id:Date.now(),texto,area:document.getElementById("f-area").value,
    prioridad:document.getElementById("f-prioridad").value,
    fecha:document.getElementById("f-fecha").value||hoy(),
    hora:document.getElementById("f-hora").value,
    nota:document.getElementById("f-nota").value,done:false});
  document.getElementById("f-texto").value="";
  document.getElementById("f-nota").value="";
  document.getElementById("f-hora").value="";
  guardar(); cerrarModal(); render();
}

function abrirChat() {
  const lista=document.getElementById("chat-lista");
  lista.innerHTML=RECORDATORIOS.map(function(r,i) {
    const imp=importados.includes(r.texto);
    const col=AREA_COLOR[r.area]||"#6B7280";
    return '<div class="chat-item'+(imp?' importado':'')+'">'+
      '<span style="font-size:11px;padding:2px 7px;border-radius:999px;background:'+col+'20;color:'+col+';font-weight:500;flex-shrink:0">'+r.area+'</span>'+
      '<div style="flex:1"><div style="font-size:13px;font-weight:500;margin-bottom:2px">'+r.texto+'</div>'+
      (r.nota?'<div style="font-size:11px;color:#6b7280">'+r.nota+'</div>':'')+
      '</div>'+
      '<button class="btn-import" style="'+(imp?'background:#D1FAE5;color:#059669':'background:#6366F1;color:#fff')+'" onclick="importarUno('+i+')" '+(imp?'disabled':'')+'>'+(imp?'✓':'+ Agregar')+'</button>'+
    '</div>';
  }).join("");
  document.getElementById("modal-chat").classList.add("show");
}
function cerrarChat() { document.getElementById("modal-chat").classList.remove("show"); render(); }
function importarUno(i) {
  const r=RECORDATORIOS[i];
  if (importados.includes(r.texto)) return;
  tareas.push({id:Date.now()+i,texto:r.texto,area:r.area,prioridad:r.prioridad,fecha:manana(),hora:"",nota:r.nota||"",done:false});
  importados.push(r.texto);
  localStorage.setItem("agenda-importados",JSON.stringify(importados));
  guardar(); abrirChat();
}
function importarTodos() { RECORDATORIOS.forEach(function(r,i){if(!importados.includes(r.texto))importarUno(i);}); cerrarChat(); }

async function procesarImagen(file) {
  if (!file) return;
  document.getElementById("upload-label").textContent="⏳ Analizando tu agenda con IA…";
  const base64=await new Promise(function(res,rej){const r=new FileReader();r.onload=function(){res(r.result.split(",")[1]);};r.onerror=rej;r.readAsDataURL(file);});
  try {
    const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:file.type,data:base64}},
        {type:"text",text:'Extrae tareas pendientes de esta imagen de agenda. Responde SOLO con JSON sin backticks: {"tasks":[{"text":"tarea","priority":"alta|media|baja"}]}. Si no hay tareas: {"tasks":[]}.'}
      ]}]})});
    const d=await resp.json();
    const raw=(d.content&&d.content.find(function(b){return b.type==="text";})||{text:"{}"}).text;
    const parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());
    if (parsed.tasks&&parsed.tasks.length) {
      parsed.tasks.forEach(function(t,i){tareas.unshift({id:Date.now()+i,texto:t.text,area:"Personal",prioridad:t.priority||"media",fecha:hoy(),hora:"",nota:"Extraído de agenda",done:false});});
      guardar(); render();
      document.getElementById("upload-label").textContent="✓ "+parsed.tasks.length+" tarea(s) extraída(s)";
    } else {
      document.getElementById("upload-label").textContent="No se encontraron tareas. Intenta con otra foto.";
    }
  } catch(e) { document.getElementById("upload-label").textContent="📷 Sube una foto de tu agenda"; }
}

render();
</script>
